<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيادة الدكتور يوسف</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="booking-container">
    <h2>حجز مواعيد العيادة</h2>
    
    <div class="selection-group">
        <label for="dateSelect">تاريخ الحجز:</label>
        <input type="date" id="dateSelect" class="custom-date">
    </div>
    
    <div class="selection-group">
        <label for="singleSelect">المواعيد المتاحة حالياً (Single):</label>
        <select id="singleSelect" class="custom-select">
        </select>
    </div>

    <div class="selection-group">
        <label for="multiSelect">اختر مواعيد الحجز (Multi):</label>
        <select id="multiSelect" multiple class="custom-select multi">
            <option value="10:00">10:00 صباحاً</option>
            <option value="11:00">11:00 صباحاً</option>
            <option value="12:00">12:00 ظهراً</option>
            <option value="01:00">01:00 ظهراً</option>
            <option value="02:00">02:00 ظهراً</option>
        </select>
        <small>اضغط Ctrl + Click لتحديد أو إلغاء تحديد المواعيد</small>
    </div>
    
    <div class="action-buttons">
        <button id="saveBtn" class="btn-primary">حفظ الحجز</button>
        <button id="clearBtn" class="btn-secondary">مسح الحجز</button>
    </div>
</div>
    <script src="main.js"></script>
</body>
</html>
